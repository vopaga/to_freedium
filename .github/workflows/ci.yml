name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Node unit tests
        run: node --test

      - name: Run PowerShell validation
        shell: pwsh
        run: pwsh -File tests/validate.ps1

      - name: Run web-ext lint
        run: npx --yes web-ext lint
