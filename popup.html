<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>To Freedium</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <main class="shell">
        <section class="hero">
            <h1>To Freedium</h1>
            <div class="status-row">
                <span id="status-badge" class="status-badge">Disabled</span>
                <button id="toggle-button" class="toggle-button" type="button" disabled>Turn on</button>
            </div>
            <p id="status-copy" class="status-copy"></p>
        </section>

        <section class="panel">
            <label class="field-label" for="mirror-url">Mirror URL or template</label>
            <input id="mirror-url" class="text-input" type="text" placeholder="https://freedium-mirror.cfd/"
                spellcheck="false" disabled>
            <p class="hint">Use <code>{id}</code> or <code>{url}</code> placeholders for templates. Cannot point at
                Medium or curated publications.</p>
            <div class="mirror-actions">
                <button id="save-mirror-button" class="secondary-button" type="button" disabled>Save</button>
                <button id="reset-mirror-button" class="secondary-button" type="button" disabled>Reset</button>
            </div>
        </section>

        <section class="panel">
            <h2>Manual open</h2>
            <input id="article-url" class="text-input" type="text"
                placeholder="https://generativeai.pub/...-36bee00c0ca2" spellcheck="false" disabled>
            <div class="manual-actions">
                <button id="open-current-button" class="secondary-button" type="button" disabled>Current page</button>
                <button id="open-url-button" class="secondary-button" type="button" disabled>Pasted URL</button>
            </div>
        </section>

        <section class="panel">
            <h2>Publication presets</h2>
            <div id="preset-list" class="preset-list"></div>
        </section>

        <p id="feedback" class="feedback" role="status" aria-live="polite"></p>

        <footer class="footer">
            <span id="version-label" class="footer-meta"></span>
            <span class="footer-sep" aria-hidden="true">·</span>
            <a class="footer-link" href="https://github.com/vopaga/to_freedium" target="_blank"
                rel="noreferrer noopener">Source</a>
            <span class="footer-sep" aria-hidden="true">·</span>
            <a class="footer-link" href="https://github.com/vopaga/to_freedium/issues" target="_blank"
                rel="noreferrer noopener">Issues</a>
            <span class="footer-sep" aria-hidden="true">·</span>
            <a class="footer-link" href="https://ko-fi.com/vopaga" target="_blank" rel="noreferrer noopener">Support</a>
        </footer>
    </main>

    <script src="mirror-template.js"></script>
    <script src="popup.js"></script>
</body>

</html>
